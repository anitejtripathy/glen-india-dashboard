<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glen UTM Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:        #08090C;
  --surface:   #0E1016;
  --surface2:  #13151D;
  --border:    #1C1F2E;
  --border2:   #252840;
  --blue:      #4F8EF7;
  --blue-dim:  rgba(79,142,247,0.12);
  --green:     #10B981;
  --amber:     #F5A623;
  --red:       #EF4444;
  --red-dim:   rgba(239,68,68,0.08);
  --text:      #E8EAEF;
  --text-dim:  #6B7280;
  --text-muted:#3D4152;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --radius:    8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
#app { max-width: 1280px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── Header ── */
header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
.site-title    { font-family: var(--mono); font-size: 18px; font-weight: 600; }
.site-subtitle { font-size: 13px; color: var(--text-dim); }
.magic-badge   {
  margin-left: auto; font-family: var(--mono); font-size: 11px; font-weight: 600;
  background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue);
  padding: 3px 12px; border-radius: 20px; letter-spacing: 0.06em;
}

/* ── Date bar ── */
#date-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  margin-bottom: 16px;
}
.chip {
  font-family: var(--mono); font-size: 12px; padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border2); background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.chip:hover  { border-color: var(--blue); color: var(--text); }
.chip.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
#custom-picker { display: none; align-items: center; gap: 8px; flex-wrap: wrap; }
#custom-picker.visible { display: flex; }
#custom-picker input[type="date"] {
  font-family: var(--mono); font-size: 12px; padding: 6px 10px;
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  border-radius: 6px; color-scheme: dark;
}
#apply-btn {
  font-family: var(--mono); font-size: 12px; padding: 6px 14px;
  background: var(--blue); color: #fff; border: none; border-radius: 6px; cursor: pointer;
}
#apply-btn:hover { opacity: 0.85; }

/* ── Status bar ── */
#status-bar { margin-bottom: 16px; }
.status-msg {
  font-family: var(--mono); font-size: 12px; padding: 10px 16px; border-radius: 6px;
  display: flex; align-items: center; gap: 10px;
}
.status-msg.error   { background: var(--red-dim);            color: var(--red);      border: 1px solid rgba(239,68,68,0.3); }
.status-msg.warning { background: rgba(245,166,35,0.08);     color: var(--amber);    border: 1px solid rgba(245,166,35,0.3); }
.status-msg.cached  { background: var(--surface);            color: var(--text-dim); border: 1px solid var(--border); }
.status-msg.loading { background: var(--surface);            color: var(--text-dim); border: 1px solid var(--border); }
.retry-btn {
  font-family: var(--mono); font-size: 11px; padding: 3px 10px;
  border: 1px solid var(--red); color: var(--red); background: transparent;
  border-radius: 4px; cursor: pointer; margin-left: auto;
}
.spinner { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Sync bar ── */
#sync-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 16px; min-height: 0;
}
.sync-chip {
  font-family: var(--mono); font-size: 11px; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.sync-chip .sync-dot { color: var(--green); margin-right: 4px; }
.refetch-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 12px;
  background: transparent; border: 1px solid var(--border2); color: var(--text-dim);
  border-radius: 20px; cursor: pointer; transition: all 0.15s;
}
.refetch-btn:hover { border-color: var(--blue); color: var(--blue); }

/* ── Multi-select dropdown ── */
.ms-wrap { position: relative; display: inline-block; }
.ms-btn {
  font-family: var(--mono); font-size: 12px; padding: 6px 12px;
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text-dim);
  border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap; transition: border-color 0.15s;
}
.ms-btn:hover { border-color: var(--blue); color: var(--text); }
.ms-btn.has-filter { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.ms-count {
  background: var(--blue); color: #fff; border-radius: 10px;
  font-size: 10px; padding: 1px 6px; min-width: 18px; text-align: center; line-height: 1.4;
}
.ms-panel {
  position: absolute; top: calc(100% + 4px); left: 0; z-index: 200;
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 6px 0; min-width: 180px; max-height: 280px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); display: none;
}
.ms-panel.open { display: block; }
.ms-option {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; cursor: pointer; font-family: var(--mono); font-size: 12px;
  color: var(--text-dim); transition: background 0.1s; user-select: none;
}
.ms-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.ms-option input[type="checkbox"] { accent-color: var(--blue); cursor: pointer; flex-shrink: 0; }
.ms-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ── Filter bar ── */
#filter-bar {
  display: none; align-items: center; gap: 8px; flex-wrap: wrap;
  margin-bottom: 20px; padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.filter-reset-btn {
  font-family: var(--mono); font-size: 11px; padding: 5px 10px;
  background: transparent; border: 1px solid var(--border2); color: var(--text-muted);
  border-radius: 6px; cursor: pointer; transition: all 0.15s; margin-left: 4px;
}
.filter-reset-btn:hover { border-color: var(--red); color: var(--red); }

/* ── Summary pills ── */
#summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px; margin-bottom: 28px;
}
.pill {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; display: flex; flex-direction: column; gap: 6px;
}
.pill-label { font-size: 12px; color: var(--text-dim); }
.pill-value { font-family: var(--mono); font-size: 22px; font-weight: 600; }
#pill-orders    .pill-value { color: var(--blue); }
#pill-revenue   .pill-value { color: var(--green); }
#pill-cancelled .pill-value { color: var(--red); }
#pill-canc-rev  .pill-value { color: var(--amber); }

/* ── Section label ── */
.section-label {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
}

/* ── Skeleton ── */
@keyframes shimmer { 0%,100%{opacity:.35} 50%{opacity:.6} }
.sk-row   { height: 44px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; animation: shimmer 1.5s infinite; }
.sk-chart { height: 240px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); animation: shimmer 1.5s infinite; }

/* ── UTM Table ── */
#table-outer { overflow-x: auto; }
#utm-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 13px; }
#utm-table thead th {
  text-align: left; padding: 10px 14px; color: var(--text-dim); font-size: 11px;
  letter-spacing: 0.07em; text-transform: uppercase; border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
#utm-table thead th:hover { color: var(--text); }
#utm-table thead th.sort-active { color: var(--blue); }
#utm-table thead th.no-sort { cursor: default; }
#utm-table thead th.no-sort:hover { color: var(--text-dim); }
#utm-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
#utm-table tbody tr:hover { background: var(--surface); }
#utm-table tbody td { padding: 11px 14px; vertical-align: middle; }
.source-cell { display: flex; align-items: center; gap: 10px; }
.src-icon { width: 22px; height: 22px; flex-shrink: 0; vertical-align: middle; }
.dim { color: var(--text-dim); }
.rev { color: var(--green); }
.can { color: var(--text-muted); }
.can.has { color: var(--red); }
.canrev { color: var(--text-muted); }
.canrev.has { color: var(--amber); }
.ch-badge {
  font-size: 10px; padding: 2px 9px;
  background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(79,142,247,0.3);
  border-radius: 10px;
}
#empty-msg { text-align: center; padding: 48px; color: var(--text-dim); font-family: var(--mono); font-size: 13px; }

/* ── Chart ── */
#chart-section { margin-top: 36px; }
#chart-controls {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px;
}
.ctrl-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.ctrl-label { font-family: var(--mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.chart-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px;
}

/* ── Download button ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-header .section-label { margin-bottom: 0; }
.download-btn {
  font-family: var(--mono); font-size: 11px; padding: 4px 12px;
  background: transparent; border: 1px solid var(--border2); color: var(--text-dim);
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
}
.download-btn:hover { border-color: var(--blue); color: var(--blue); }

@media (max-width: 600px) {
  #summary { grid-template-columns: repeat(2, 1fr); }
  .pill-value { font-size: 18px; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="site-title">Glen UTM Dashboard</span>
    <span class="site-subtitle">UTM and Cancellation Analytics</span>
    <span class="magic-badge">✦ Magic</span>
  </header>

  <section id="date-bar">
    <button class="chip" data-preset="7d">Last 7d</button>
    <button class="chip" data-preset="30d">Last 30d</button>
    <button class="chip" data-preset="this-month">This month</button>
    <button class="chip" data-preset="last-month">Last month</button>
    <button class="chip" data-preset="custom">Custom</button>
    <div id="custom-picker">
      <input type="date" id="from-date" min="2026-04-01">
      <span class="dim" style="font-family:var(--mono)">→</span>
      <input type="date" id="to-date" min="2026-04-01">
      <button id="apply-btn">Fetch</button>
    </div>
  </section>

  <div id="status-bar"></div>
  <div id="sync-bar"></div>

  <!-- Filter bar (shown after first data load) -->
  <div id="filter-bar">
    <span class="ctrl-label">Filter</span>
    <div class="ms-wrap" id="ms-source">
      <button class="ms-btn">Source ▾</button>
      <div class="ms-panel"></div>
    </div>
    <div class="ms-wrap" id="ms-medium">
      <button class="ms-btn">Medium ▾</button>
      <div class="ms-panel"></div>
    </div>
    <div class="ms-wrap" id="ms-campaign">
      <button class="ms-btn">Campaign ▾</button>
      <div class="ms-panel"></div>
    </div>
    <div class="ms-wrap" id="ms-content">
      <button class="ms-btn">Content ▾</button>
      <div class="ms-panel"></div>
    </div>
    <div class="ms-wrap" id="ms-term">
      <button class="ms-btn">Term ▾</button>
      <div class="ms-panel"></div>
    </div>
    <button id="filter-reset" class="filter-reset-btn" style="display:none">✕ Reset filters</button>
  </div>

  <section id="summary">
    <div class="pill" id="pill-orders">
      <span class="pill-label">Magic Orders</span>
      <span class="pill-value" id="val-orders">—</span>
    </div>
    <div class="pill" id="pill-revenue">
      <span class="pill-label">Total Revenue</span>
      <span class="pill-value" id="val-revenue">—</span>
    </div>
    <div class="pill" id="pill-cancelled">
      <span class="pill-label">Cancellations</span>
      <span class="pill-value" id="val-cancelled">—</span>
    </div>
    <div class="pill" id="pill-canc-rev">
      <span class="pill-label">Cancelled Revenue</span>
      <span class="pill-value" id="val-canc-rev">—</span>
    </div>
  </section>

  <div class="section-header">
    <p class="section-label">UTM Breakdown</p>
    <button id="download-btn" class="download-btn" style="display:none">↓ Download TSV</button>
  </div>
  <div id="table-skeleton"></div>
  <div id="table-outer" style="display:none">
    <div id="empty-msg" style="display:none">No Magic orders found for this date range.</div>
    <table id="utm-table">
      <thead>
        <tr>
          <th data-col="utm_source">Source</th>
          <th data-col="utm_medium">Medium</th>
          <th data-col="utm_campaign">Campaign</th>
          <th data-col="utm_content">Content</th>
          <th data-col="utm_term">Term</th>
          <th data-col="orders">Orders</th>
          <th data-col="revenue">Revenue</th>
          <th data-col="cancellations">Cancelled</th>
          <th data-col="cancelledRevenue">Canc. Rev</th>
          <th class="no-sort">Channel</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <section id="chart-section">
    <p class="section-label">Trend</p>
    <div id="chart-controls">
      <div class="ctrl-group">
        <span class="ctrl-label">Metric</span>
        <button class="chip metric-chip active" data-metric="orders">Orders</button>
        <button class="chip metric-chip" data-metric="revenue">Revenue</button>
        <button class="chip metric-chip" data-metric="cancellations">Cancellations</button>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Source</span>
        <div class="ms-wrap" id="ms-chart-source">
          <button class="ms-btn">All Sources ▾</button>
          <div class="ms-panel"></div>
        </div>
      </div>
    </div>
    <div id="chart-skeleton"></div>
    <div id="chart-box" class="chart-box" style="display:none">
      <canvas id="trend-chart"></canvas>
    </div>
  </section>

</div>
<script src="config.js"></script>
<script>
// ─── Icons ─────────────────────────────────────────────────────────────────────
const ICON_ALIASES = {
  meta: 'facebook', metaads: 'facebook',
  adwords: 'google', googlepmax: 'google', googleads: 'google',
  googleppc: 'google', ppc: 'google',
  ig: 'instagram',
};

const _FB  = `<svg class="src-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="4" fill="#1877F2"/><path d="M13.5 12h2l.4-2.5H13.5V8.2c0-.7.3-1.1 1.2-1.1H16V5a16 16 0 00-2.2-.2c-2.2 0-3.6 1.3-3.6 3.7V9.5H8v2.5h2.2V19h3.3V12z" fill="#fff"/></svg>`;
const _IG  = `<svg class="src-icon" viewBox="0 0 24 24"><defs><linearGradient id="ig-g" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="5" fill="url(#ig-g)"/><circle cx="12" cy="12" r="4.5" stroke="#fff" stroke-width="1.5" fill="none"/><circle cx="17.5" cy="6.5" r="1.2" fill="#fff"/></svg>`;
const _GG  = `<svg class="src-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#fff"/><path d="M20.5 12a8.6 8.6 0 00-.2-2H12v3.8h4.8a4.1 4.1 0 01-1.8 2.7v2.2h2.9C19.6 17 20.5 14.7 20.5 12z" fill="#4285F4"/><path d="M12 21c2.7 0 5-.9 6.7-2.3l-2.9-2.2a5.1 5.1 0 01-3.8 1c-2.9 0-5.4-2-6.3-4.6H2.7v2.3A10 10 0 0012 21z" fill="#34A853"/><path d="M5.7 12.9a5.8 5.8 0 010-3.8V6.8H2.7a10 10 0 000 10.4l3-2.3z" fill="#FBBC05"/><path d="M12 6.1c1.6 0 3 .6 4.1 1.5l2.7-2.7A10 10 0 002.7 6.8l3 2.3C6.6 7.1 9.1 6.1 12 6.1z" fill="#EA4335"/></svg>`;
const _GL  = `<svg class="src-icon" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 3c-2 3-3 5.5-3 9s1 6 3 9M12 3c2 3 3 5.5 3 9s-1 6-3 9M3 12h18"/></svg>`;

const ICONS = {
  instagram: _IG, fb: _FB, facebook: _FB,
  google: _GG, cpc: _GG,
  youtube:  `<svg class="src-icon" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="4" fill="#FF0000"/><polygon points="10,8 10,16 17,12" fill="#fff"/></svg>`,
  whatsapp: `<svg class="src-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#25D366"/><path d="M17.5 14.5c-.3-.2-1.6-.8-1.9-.9-.3-.1-.5-.1-.7.1s-.8 1-.9 1.2-.3.2-.6 0c-1.7-.8-2.8-1.8-3.5-3.2-.2-.4 0-.5.1-.7l.5-.6c.1-.2.1-.3.2-.5s0-.3 0-.5-.8-2-1.1-2.7c-.3-.7-.6-.6-.9-.6h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.5s1 2.8 1.1 3c.1.1 2 3.1 4.9 4.3 2.9 1.2 2.9.8 3.4.7.5 0 1.6-.7 1.8-1.3.2-.6.2-1.2.2-1.3z" fill="#fff"/></svg>`,
  email:    `<svg class="src-icon" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>`,
  direct:   _GL, default: _GL,
};

const COLORS = {
  ig: '#dc2743', instagram: '#dc2743', meta: '#1877F2', metaads: '#1877F2',
  fb: '#1877F2', facebook: '#1877F2',
  google: '#4285F4', cpc: '#4285F4', adwords: '#4285F4',
  googlepmax: '#4285F4', googleads: '#4285F4', googleppc: '#4285F4', ppc: '#4285F4',
  youtube: '#FF0000', whatsapp: '#25D366', email: '#9CA3AF', direct: '#6B7280',
};

// Extended palette for unlisted sources (deterministic by hash)
const PALETTE = [
  '#4285F4','#EA4335','#FBBC04','#34A853','#FF6D00','#7B61FF',
  '#00BCD4','#FF4081','#8BC34A','#FF9800','#9C27B0','#00ACC1',
  '#E91E63','#009688','#FF5722','#607D8B',
];

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

const MIN_DATE = '2026-04-01';
function clampFrom(d) { return d < MIN_DATE ? MIN_DATE : d; }
function todayStr()   { return new Date().toISOString().slice(0, 10); }
function pad(n)       { return String(n).padStart(2, '0'); }
function daysAgo(n)   { const d = new Date(); d.setDate(d.getDate() - n); return d.toISOString().slice(0, 10); }

const PRESETS = {
  '7d':         () => ({ from: clampFrom(daysAgo(7)),  to: todayStr() }),
  '30d':        () => ({ from: clampFrom(daysAgo(30)), to: todayStr() }),
  'this-month': () => {
    const d = new Date();
    return { from: clampFrom(`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`), to: todayStr() };
  },
  'last-month': () => {
    const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - 1);
    const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    return {
      from: clampFrom(`${d.getFullYear()}-${pad(d.getMonth()+1)}-01`),
      to:   `${last.getFullYear()}-${pad(last.getMonth()+1)}-${pad(last.getDate())}`,
    };
  },
};

function formatINR(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function srcKey(s) {
  const k = (s || '').toLowerCase().trim().replace(/[^a-z]/g, '') || 'default';
  return ICON_ALIASES[k] || k;
}
function getIcon(s)       { return ICONS[srcKey(s)] || ICONS.default; }
function getNamedColor(s) { return COLORS[srcKey(s)] || null; }
function getChartColor(s) {
  const rawKey = (s || '').toLowerCase().trim() || 'default';
  return PALETTE[hashCode(rawKey) % PALETTE.length];
}
function metricLabel(m) {
  return m === 'orders' ? 'Orders' : m === 'revenue' ? 'Revenue' : 'Cancellations';
}

// ─── localStorage cache ────────────────────────────────────────────────────────
const CACHE_TTL = 24 * 3600 * 1000;

function cacheGet(from, to) {
  try {
    const raw = localStorage.getItem(`glen-india:${from}:${to}`);
    if (!raw) return null;
    const { data, savedAt } = JSON.parse(raw);
    const fresh = Date.now() - new Date(savedAt).getTime() < CACHE_TTL;
    return { data, savedAt, fresh };
  } catch { return null; }
}

function cacheSet(from, to, data) {
  try {
    localStorage.setItem(`glen-india:${from}:${to}`,
      JSON.stringify({ data, savedAt: new Date().toISOString() }));
  } catch (_) {}
}

// ─── Multi-select dropdown ─────────────────────────────────────────────────────
class MultiSelect {
  constructor(wrapEl, label, onChange) {
    this._label = label;
    this._onChange = onChange;
    this._selected = new Set();
    this._options = [];
    this._wrap = wrapEl;
    this._btn = wrapEl.querySelector('.ms-btn');
    this._panel = wrapEl.querySelector('.ms-panel');
    this._btn.addEventListener('click', e => {
      e.stopPropagation();
      const wasOpen = this._panel.classList.contains('open');
      // Close all panels first
      document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
      if (!wasOpen) this._panel.classList.add('open');
    });
    this._panel.addEventListener('click', e => e.stopPropagation());
  }

  setOptions(opts) {
    this._options = [...opts];
    for (const v of [...this._selected]) {
      if (!this._options.includes(v)) this._selected.delete(v);
    }
    this._renderPanel();
    this._updateBtn();
  }

  reset() {
    this._selected.clear();
    this._renderPanel();
    this._updateBtn();
    this._onChange(this._selected);
  }

  isAll()       { return this._selected.size === 0; }
  getSelected() { return this._selected; }

  _toggleOpt(val) {
    if (this._selected.size === 0) {
      this._options.forEach(o => { if (o !== val) this._selected.add(o); });
    } else if (this._selected.has(val)) {
      this._selected.delete(val);
    } else {
      this._selected.add(val);
      if (this._selected.size === this._options.length) this._selected.clear();
    }
    this._renderPanel();
    this._updateBtn();
    this._onChange(this._selected);
  }

  _renderPanel() {
    const allMode = this._selected.size === 0;
    this._panel.innerHTML = '';

    const allLbl = document.createElement('label');
    allLbl.className = 'ms-option';
    const allCb = document.createElement('input');
    allCb.type = 'checkbox'; allCb.checked = allMode;
    allCb.addEventListener('change', () => {
      this._selected.clear(); this._renderPanel(); this._updateBtn(); this._onChange(this._selected);
    });
    allLbl.appendChild(allCb);
    allLbl.appendChild(document.createTextNode(' All'));
    this._panel.appendChild(allLbl);

    if (this._options.length) {
      const hr = document.createElement('div');
      hr.className = 'ms-divider';
      this._panel.appendChild(hr);
    }

    this._options.forEach(opt => {
      const lbl = document.createElement('label');
      lbl.className = 'ms-option';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = allMode || this._selected.has(opt);
      cb.addEventListener('change', () => this._toggleOpt(opt));
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(' ' + opt));
      this._panel.appendChild(lbl);
    });
  }

  _updateBtn() {
    const n = this._selected.size;
    if (n > 0) {
      this._btn.innerHTML = `${this._label} <span class="ms-count">${n}</span> ▾`;
      this._btn.classList.add('has-filter');
    } else {
      this._btn.innerHTML = `${this._label} ▾`;
      this._btn.classList.remove('has-filter');
    }
  }
}

// Close all dropdowns when clicking outside
document.addEventListener('click', () => {
  document.querySelectorAll('.ms-panel.open').forEach(p => p.classList.remove('open'));
});

// ─── Filter state ──────────────────────────────────────────────────────────────
let msSource, msMedium, msCampaign, msContent, msTerm, msChartSource;

function initFilters() {
  msSource      = new MultiSelect(document.getElementById('ms-source'),      'Source',      updateTableFilters);
  msMedium      = new MultiSelect(document.getElementById('ms-medium'),      'Medium',      updateTableFilters);
  msCampaign    = new MultiSelect(document.getElementById('ms-campaign'),    'Campaign',    updateTableFilters);
  msContent     = new MultiSelect(document.getElementById('ms-content'),     'Content',     updateTableFilters);
  msTerm        = new MultiSelect(document.getElementById('ms-term'),        'Term',        updateTableFilters);
  msChartSource = new MultiSelect(document.getElementById('ms-chart-source'),'All Sources', () => {
    if (lastData) renderChart(lastData.timeseries);
  });
}

function populateFilters(data) {
  const uniq = arr => [...new Set(arr)].filter(v => v != null && v !== '').sort();
  msSource.setOptions(uniq(data.rows.map(r => r.utm_source)));
  msMedium.setOptions(uniq(data.rows.map(r => r.utm_medium)));
  msCampaign.setOptions(uniq(data.rows.map(r => r.utm_campaign)));
  msContent.setOptions(uniq(data.rows.map(r => r.utm_content || '')));
  msTerm.setOptions(uniq(data.rows.map(r => r.utm_term || '')));
  msChartSource.setOptions(uniq(data.timeseries.map(r => r.utm_source)));
  document.getElementById('filter-bar').style.display = 'flex';
}

function getFilteredRows() {
  if (!lastData) return [];
  return lastData.rows.filter(r =>
    (msSource.isAll()   || msSource.getSelected().has(r.utm_source))   &&
    (msMedium.isAll()   || msMedium.getSelected().has(r.utm_medium))   &&
    (msCampaign.isAll() || msCampaign.getSelected().has(r.utm_campaign)) &&
    (msContent.isAll()  || msContent.getSelected().has(r.utm_content || '')) &&
    (msTerm.isAll()     || msTerm.getSelected().has(r.utm_term || ''))
  );
}

function updateTableFilters() {
  if (!lastData) return;
  const rows = getFilteredRows();
  renderSummary(rows);
  renderTable(rows);
  const hasFilter = !msSource.isAll() || !msMedium.isAll() || !msCampaign.isAll() || !msContent.isAll() || !msTerm.isAll();
  document.getElementById('filter-reset').style.display = hasFilter ? 'inline-block' : 'none';
}

// ─── Status bar ────────────────────────────────────────────────────────────────
function setStatus(html) { document.getElementById('status-bar').innerHTML = html; }
function clearStatus()   { setStatus(''); }

function showLoading() {
  setStatus(`<div class="status-msg loading"><span class="spinner">⟳</span>&nbsp;Fetching Magic orders from Shopify…</div>`);
}
function showError(msg, from, to) {
  setStatus(`<div class="status-msg error">
    <span>⚠ ${esc(msg)}</span>
    <button class="retry-btn" data-retry-from="${esc(from)}" data-retry-to="${esc(to)}">Retry</button>
  </div>`);
}
function showWarning(msg) { setStatus(`<div class="status-msg warning">⚠ ${msg}</div>`); }
function showCachedMsg(savedAt, stale = false) {
  const when = new Date(savedAt).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
  const txt = stale
    ? `⟳ Stale cache from ${when} — refreshing in background…`
    : `✓ Loaded from cache · saved ${when}`;
  setStatus(`<div class="status-msg cached">${txt}</div>`);
}

// ─── Render ────────────────────────────────────────────────────────────────────
function renderSummary(rows) {
  const orders   = rows.reduce((s, r) => s + r.orders, 0);
  const rev      = rows.reduce((s, r) => s + r.revenue, 0);
  const canc     = rows.reduce((s, r) => s + r.cancellations, 0);
  const cancRev  = rows.reduce((s, r) => s + (r.cancelledRevenue || 0), 0);
  document.getElementById('val-orders').textContent   = orders.toLocaleString('en-IN');
  document.getElementById('val-revenue').textContent  = formatINR(rev);
  document.getElementById('val-cancelled').textContent= canc.toLocaleString('en-IN');
  document.getElementById('val-canc-rev').textContent = formatINR(cancRev);
}

let sortCol = 'orders', sortDir = -1;
const COL_LABELS = {
  utm_source: 'Source', utm_medium: 'Medium', utm_campaign: 'Campaign',
  utm_content: 'Content', utm_term: 'Term',
  orders: 'Orders', revenue: 'Revenue', cancellations: 'Cancelled', cancelledRevenue: 'Canc. Rev',
};

function renderTable(rows) {
  hideTableSkeleton();
  const dlBtn = document.getElementById('download-btn');
  if (dlBtn) dlBtn.style.display = rows.length ? 'inline-block' : 'none';
  const empty = document.getElementById('empty-msg');
  const table = document.getElementById('utm-table');
  if (!rows.length) { empty.style.display = 'block'; table.style.display = 'none'; return; }
  empty.style.display = 'none';
  table.style.display = 'table';

  const sorted = [...rows].sort((a, b) => {
    const av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    return sortDir * (av < bv ? -1 : av > bv ? 1 : 0);
  });

  document.querySelectorAll('#utm-table thead th[data-col]').forEach(th => {
    const base = COL_LABELS[th.dataset.col] || th.dataset.col;
    th.classList.toggle('sort-active', th.dataset.col === sortCol);
    th.textContent = base + (th.dataset.col === sortCol ? (sortDir === -1 ? ' ↓' : ' ↑') : '');
  });

  document.getElementById('table-body').innerHTML = sorted.map(r => `
    <tr>
      <td><div class="source-cell">${getIcon(r.utm_source)}<span>${esc(r.utm_source)}</span></div></td>
      <td class="dim">${esc(r.utm_medium)}</td>
      <td class="dim">${esc(r.utm_campaign)}</td>
      <td class="dim">${esc(r.utm_content || '')}</td>
      <td class="dim">${esc(r.utm_term || '')}</td>
      <td><strong>${r.orders.toLocaleString('en-IN')}</strong></td>
      <td class="rev">${formatINR(r.revenue)}</td>
      <td class="can${r.cancellations > 0 ? ' has' : ''}">${r.cancellations}</td>
      <td class="canrev${(r.cancelledRevenue||0) > 0 ? ' has' : ''}">${formatINR(r.cancelledRevenue || 0)}</td>
      <td><span class="ch-badge">Magic</span></td>
    </tr>
  `).join('');
}

// ─── Chart ────────────────────────────────────────────────────────────────────
let chart = null;
let currentMetric = 'orders';
const MAX_CHART_SERIES = 8;

function renderChart(timeseries) {
  hideChartSkeleton();
  if (!timeseries.length) return;

  const dates   = [...new Set(timeseries.map(r => r.date))].sort();
  const allSrcs = [...new Set(timeseries.map(r => r.utm_source))];

  msChartSource.setOptions(allSrcs);

  const selectedSrcs = msChartSource.isAll()
    ? allSrcs
    : [...msChartSource.getSelected()].filter(s => allSrcs.includes(s));

  let mainSrcs = selectedSrcs, otherSrcs = [];
  if (selectedSrcs.length > MAX_CHART_SERIES) {
    const totals = {};
    timeseries.forEach(r => {
      if (selectedSrcs.includes(r.utm_source))
        totals[r.utm_source] = (totals[r.utm_source] || 0) + r.orders;
    });
    const ranked = [...selectedSrcs].sort((a, b) => (totals[b]||0) - (totals[a]||0));
    mainSrcs  = ranked.slice(0, MAX_CHART_SERIES);
    otherSrcs = ranked.slice(MAX_CHART_SERIES);
  }

  const isRevenue = currentMetric === 'revenue';
  const datasets = [];

  mainSrcs.forEach(src => {
    const color = getChartColor(src);
    datasets.push({
      label: mainSrcs.length === 1 ? metricLabel(currentMetric) : src,
      data: dates.map(d => {
        const e = timeseries.find(r => r.date === d && r.utm_source === src);
        return e ? (e[currentMetric] || 0) : 0;
      }),
      borderColor: color, backgroundColor: color + '22',
      tension: 0.3, pointRadius: 3, pointHoverRadius: 5,
    });
  });

  if (otherSrcs.length) {
    datasets.push({
      label: `Other (${otherSrcs.length})`,
      data: dates.map(d => otherSrcs.reduce((sum, src) => {
        const e = timeseries.find(r => r.date === d && r.utm_source === src);
        return sum + (e ? (e[currentMetric] || 0) : 0);
      }, 0)),
      borderColor: '#6B7280', backgroundColor: '#6B728022',
      tension: 0.3, pointRadius: 2, borderDash: [4, 2],
    });
  }

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('trend-chart').getContext('2d'), {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: datasets.length > 1,
          position: 'bottom',
          labels: {
            color: '#6B7280', font: { family: 'IBM Plex Mono', size: 10 },
            boxWidth: 12, padding: 12, usePointStyle: true,
          },
        },
        tooltip: {
          backgroundColor: '#0E1016', borderColor: '#252840', borderWidth: 1,
          titleColor: '#E8EAEF', bodyColor: '#6B7280',
          titleFont: { family: 'IBM Plex Mono' }, bodyFont: { family: 'IBM Plex Mono', size: 12 },
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return ` ${ctx.dataset.label}: ${isRevenue ? formatINR(v) : v}`;
            },
          },
        },
      },
      scales: {
        x: {
          grid: { color: '#1C1F2E' },
          ticks: { color: '#6B7280', font: { family: 'IBM Plex Mono', size: 11 }, maxRotation: 45 },
        },
        y: {
          grid: { color: '#1C1F2E' },
          ticks: {
            color: '#6B7280', font: { family: 'IBM Plex Mono', size: 11 },
            callback: v => isRevenue ? formatINR(v) : v,
          },
        },
      },
    },
  });
}

function renderAll(data) {
  populateFilters(data);
  const rows = getFilteredRows();
  renderSummary(rows);
  renderTable(rows);
  renderChart(data.timeseries);
}

// ─── Fetch + cache orchestration ───────────────────────────────────────────────
let pendingFrom = null, pendingTo = null;
let currentFrom = null, currentTo = null;
let lastData    = null;

function setSyncBar(data, from, to) {
  const bar = document.getElementById('sync-bar');
  if (!data?.fetchedAt) { bar.innerHTML = ''; return; }
  const when = new Date(data.fetchedAt).toLocaleString('en-IN', {
    timeZone: 'Asia/Kolkata', dateStyle: 'medium', timeStyle: 'short',
  });
  const canRefetch = to >= todayStr();
  bar.innerHTML = `<span class="sync-chip"><span class="sync-dot">●</span>Data as of ${when}</span>`
    + (canRefetch ? `<button class="refetch-btn" id="refetch-btn">↺ Refresh</button>` : '');
  if (canRefetch) {
    document.getElementById('refetch-btn').addEventListener('click', () => triggerRefetch(from, to));
  }
}

function triggerRefetch(from, to) {
  localStorage.removeItem(`glen-india:${from}:${to}`);
  pendingFrom = from; pendingTo = to;
  clearStatus();
  document.getElementById('sync-bar').innerHTML = '';
  showLoading(); showTableSkeleton(); showChartSkeleton();
  fetch(`${CONFIG.WORKER_URL}?from=${from}&to=${to}&refresh=1`)
    .then(r => { if (!r.ok) throw new Error(`Worker returned ${r.status}`); return r.json(); })
    .then(data => {
      if (data.error) throw new Error(data.error);
      cacheSet(from, to, data);
      if (pendingFrom === from && pendingTo === to) {
        lastData = data; currentFrom = from; currentTo = to;
        if (data.incomplete) showWarning('Large date range — data may be incomplete.');
        else clearStatus();
        renderAll(data); setSyncBar(data, from, to);
      }
    })
    .catch(err => { if (pendingFrom === from && pendingTo === to) showError(err.message, from, to); });
}

async function loadRange(from, to) {
  pendingFrom = from; pendingTo = to;

  if ((new Date(to) - new Date(from)) / 86400000 > 180) {
    showError('Date range exceeds 180 days — please select a shorter range.', from, to);
    return;
  }

  const cached = cacheGet(from, to);

  if (cached?.fresh) {
    lastData = cached.data; currentFrom = from; currentTo = to;
    clearStatus(); renderAll(cached.data); setSyncBar(lastData, from, to);
    return;
  }

  if (cached) {
    lastData = cached.data; currentFrom = from; currentTo = to;
    renderAll(cached.data); setSyncBar(lastData, from, to);
    showCachedMsg(cached.savedAt, true);
  } else {
    showLoading(); showTableSkeleton(); showChartSkeleton();
  }

  try {
    const resp = await fetch(`${CONFIG.WORKER_URL}?from=${from}&to=${to}`);
    if (!resp.ok) throw new Error(`Worker returned ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    cacheSet(from, to, data);
    if (pendingFrom === from && pendingTo === to) {
      lastData = data; currentFrom = from; currentTo = to;
      if (data.incomplete) showWarning('Large date range — data may be incomplete.');
      else clearStatus();
      renderAll(data); setSyncBar(data, from, to);
    }
  } catch (err) {
    if (pendingFrom === from && pendingTo === to) {
      if (!cached) showError(err.message, from, to);
      else showWarning(`Could not refresh: ${err.message}`);
    }
  }
}

// ─── TSV download ──────────────────────────────────────────────────────────────
function referringPlatform(source) {
  const s = (source || '').toLowerCase();
  if (/google|adwords|gads|pmax|googleppc/.test(s)) return 'Alphabet';
  if (/facebook|fb|meta/.test(s)) return 'Meta';
  if (/instagram|ig/.test(s)) return 'Meta';
  if (/youtube/.test(s)) return 'Alphabet';
  if (/whatsapp/.test(s)) return 'Meta';
  return source || '(direct)';
}

function referringChannel(medium) {
  const m = (medium || '').toLowerCase();
  if (/cpc|ppc|paid/.test(m)) return 'Paid';
  if (/social/.test(m)) return 'Social';
  if (/email/.test(m)) return 'Email';
  if (/organic/.test(m)) return 'Organic Search';
  if (/affiliate/.test(m)) return 'Affiliates';
  if (/referral/.test(m)) return 'Referral';
  if (m === '(none)' || m === '') return 'Direct';
  return medium || '(none)';
}

async function downloadTSV() {
  if (!currentFrom || !currentTo) return;
  const btn = document.getElementById('download-btn');
  btn.textContent = '⟳ Fetching…';
  btn.disabled = true;
  try {
    const resp = await fetch(`${CONFIG.WORKER_URL}?from=${currentFrom}&to=${currentTo}&format=lineitem`);
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    const rows = await resp.json();
    if (rows.error) throw new Error(rows.error);
    if (!Array.isArray(rows) || !rows.length) {
      showWarning('No line-item data found for this date range.'); return;
    }
    doDownloadTSV(rows);
  } catch (err) {
    showWarning(`Download failed: ${err.message}`);
  } finally {
    btn.textContent = '↓ Download TSV';
    btn.disabled = false;
  }
}

function doDownloadTSV(rows) {
  const headers = [
    'Order UTM source','Order UTM medium','Order UTM campaign',
    'Order UTM content','Order UTM term',
    'Product type','Product title',
    'Referring channel','Referring platform',
    'Month',
    'Orders (last click)','Gross sales (last click)','Discounts (last click)',
    'Returns (last click)','Net sales (last click)','Shipping charges (last click)',
    'Duties (last click)','Additional fees (last click)','Taxes (last click)',
    'Total sales (last click)','Net items sold (last click)',
  ];
  const lines = rows.map(r => [
    r.utm_source, r.utm_medium, r.utm_campaign,
    r.utm_content || '', r.utm_term || '',
    r.product_type || '', r.product_title || '',
    referringChannel(r.utm_medium), referringPlatform(r.utm_source),
    r.month,
    r.orders, r.gross_sales, r.discounts,
    r.returns, r.net_sales, r.shipping,
    r.duties, r.additional_fees, r.taxes,
    r.total_sales, r.net_items,
  ].join('\t'));
  const tsv = [headers.join('\t'), ...lines].join('\n');
  const blob = new Blob([tsv], { type: 'text/tab-separated-values' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `glen-india-utm-${currentFrom}_${currentTo}.tsv`;
  a.click(); URL.revokeObjectURL(a.href);
}

// ─── Event wiring ──────────────────────────────────────────────────────────────
document.querySelectorAll('.chip[data-preset]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-preset]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.preset === 'custom') {
      document.getElementById('custom-picker').classList.add('visible');
    } else {
      document.getElementById('custom-picker').classList.remove('visible');
      const { from, to } = PRESETS[btn.dataset.preset]();
      loadRange(from, to);
    }
  });
});

document.getElementById('status-bar').addEventListener('click', e => {
  const btn = e.target.closest('.retry-btn');
  if (btn) loadRange(btn.dataset.retryFrom, btn.dataset.retryTo);
});

document.getElementById('apply-btn').addEventListener('click', () => {
  const from = document.getElementById('from-date').value;
  const to   = document.getElementById('to-date').value;
  if (!from || !to) { showWarning('Please select both dates.'); return; }
  if (from > to)    { showWarning('Start date must be before end date.'); return; }
  if (from < MIN_DATE) { showWarning(`Data is only available from ${MIN_DATE}.`); return; }
  loadRange(from, to);
});

document.querySelectorAll('.metric-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.metric === currentMetric) return;
    document.querySelectorAll('.metric-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMetric = btn.dataset.metric;
    if (lastData) renderChart(lastData.timeseries);
  });
});

document.querySelectorAll('#utm-table thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    sortDir = sortCol === th.dataset.col ? sortDir * -1 : -1;
    sortCol = th.dataset.col;
    if (lastData) renderTable(getFilteredRows());
  });
});

document.getElementById('filter-reset').addEventListener('click', () => {
  msSource.reset(); msMedium.reset(); msCampaign.reset(); msContent.reset(); msTerm.reset();
  document.getElementById('filter-reset').style.display = 'none';
  if (lastData) { renderSummary(getFilteredRows()); renderTable(getFilteredRows()); }
});

document.getElementById('download-btn').addEventListener('click', downloadTSV);

// ─── Init ──────────────────────────────────────────────────────────────────────
initFilters();
document.querySelector('.chip[data-preset="30d"]').click();
