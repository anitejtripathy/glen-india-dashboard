name = "glen-india-utm"
main = "worker.js"
compatibility_date = "2024-10-01"

# KV namespace for caching Shopify API responses.
# After running: npx wrangler kv:namespace create GLEN_INDIA_CACHE
# paste the returned id below.
[[kv_namespaces]]
binding = "GLEN_INDIA_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# GitHub Pages origin — the browser's Origin header from anitejtripathy.github.io/*
ALLOWED_ORIGIN = "https://anitejtripathy.github.io"

# SHOPIFY_ADMIN_TOKEN is a secret — never put it here.
# Set it with: npx wrangler secret put SHOPIFY_ADMIN_TOKEN
